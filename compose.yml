services:
  db:
    image: postgres:16-alpine
    container_name: photoapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: photoapp
      POSTGRES_PASSWORD: photoapp
      POSTGRES_DB: photoapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://photoapp:photoapp@db:5432/photoapp"
      STORAGE_BACKEND: "local"
      UPLOAD_DIR: "/data/uploads"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - db
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - data:/data
    command:
      - sh
      - -lc
      - |
        if [ -f package-lock.json ]; then
          if [ ! -f node_modules/.package-lock.json ] || ! cmp -s package-lock.json node_modules/.package-lock.json; then
            npm ci
          fi
        elif [ ! -x node_modules/.bin/next ]; then
          npm install
        fi
        npx prisma generate || true
        npx prisma migrate deploy || true
        if [ "${STORAGE_BACKEND:-local}" = "local" ]; then
          mkdir -p "$$UPLOAD_DIR"
        fi
        npm run dev -- --hostname 0.0.0.0

volumes:
  node_modules:
  data:
  postgres_data: