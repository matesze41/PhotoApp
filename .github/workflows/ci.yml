name: Docker CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          password: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      - name: Build image (PR + push)
        run: docker build -t photoapp-ci .

      - name: Build and Push to ACR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/photoapp:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/photoapp:latest

  deploy-schematic:
    name: Deploy (schematic)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    env:
      # Expected GitHub Environment Variables:
      # - AZURE_RESOURCE_GROUP
      # - AZURE_CONTAINERAPP_NAME
      # Optional GitHub Environment Variables:
      # - AZURE_STORAGE_CONTAINER (for app runtime env)
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME }}
      AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}

      # Expected GitHub Repository Secret:
      # - ACR_LOGIN_SERVER
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

      # Optional GitHub Environment Secrets (used when wiring runtime config from CI):
      # - DATABASE_URL
      # - AUTH_SECRET
      # - AZURE_STORAGE_CONNECTION_STRING
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate required deploy variables
        run: |
          test -n "$AZURE_RESOURCE_GROUP" || (echo "Missing vars.AZURE_RESOURCE_GROUP" && exit 1)
          test -n "$AZURE_CONTAINERAPP_NAME" || (echo "Missing vars.AZURE_CONTAINERAPP_NAME" && exit 1)
          test -n "$ACR_LOGIN_SERVER" || (echo "Missing secrets.ACR_LOGIN_SERVER" && exit 1)

      - name: Deploy image to Azure Container Apps
        run: |
          IMAGE="$ACR_LOGIN_SERVER/photoapp:${{ github.sha }}"
          az containerapp update \
            --name "$AZURE_CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE"

      - name: Optional runtime env/secrets wiring (remove guard after filling secrets)
        if: false # SECRETS NOT APPLIED YET - Remove this guard and keep this step once runtime values exist. Requires secrets: DATABASE_URL, AUTH_SECRET, AZURE_STORAGE_CONNECTION_STRING and variable: AZURE_STORAGE_CONTAINER
        run: |
          # TODO: Remove this guard and keep this step once runtime values exist.
          # Requires secrets: DATABASE_URL, AUTH_SECRET, AZURE_STORAGE_CONNECTION_STRING
          # Requires variable: AZURE_STORAGE_CONTAINER
          az containerapp secret set \
            --name "$AZURE_CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets \
              database-url="$DATABASE_URL" \
              auth-secret="$AUTH_SECRET" \
              azure-storage-conn="$AZURE_STORAGE_CONNECTION_STRING"

          az containerapp update \
            --name "$AZURE_CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --set-env-vars \
              NODE_ENV=production \
              STORAGE_BACKEND=azure \
              AZURE_STORAGE_CONTAINER="$AZURE_STORAGE_CONTAINER" \
              DATABASE_URL=secretref:database-url \
              AUTH_SECRET=secretref:auth-secret \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-conn