name: Docker CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          password: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}

      - name: Build image (PR + push)
        run: docker build -t photoapp-ci .

      - name: Build and Push to ACR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/photoapp:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/photoapp:latest

  deploy-schematic:
    name: Deploy (schematic)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    env:
      # Supports both GitHub Environment Variables and Environment Secrets.
      # Required:
      # - AZURE_RESOURCE_GROUP (var or secret)
      # - AZURE_CONTAINERAPP_NAME (var or secret)
      # Optional:
      # - AZURE_STORAGE_CONTAINER (var or secret)
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME || secrets.AZURE_CONTAINERAPP_NAME }}
      AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER || secrets.AZURE_STORAGE_CONTAINER }}
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'azure' }}
      AUTH_URL: ${{ vars.AUTH_URL || secrets.AUTH_URL }}
      AUTH_TRUST_HOST: ${{ vars.AUTH_TRUST_HOST || 'true' }}

      # Expected GitHub Repository Secret:
      # - ACR_LOGIN_SERVER
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

      # Optional GitHub Environment/Repository Secrets (used when wiring runtime config from CI):
      # - DATABASE_URL
      # - AUTH_SECRET
      # - AZURE_STORAGE_CONNECTION_STRING
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      # Keep disabled by default to preserve currently working runtime config in Azure.
      ENABLE_RUNTIME_SYNC: ${{ vars.ENABLE_RUNTIME_SYNC || 'false' }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate required deploy variables
        run: |
          test -n "$AZURE_RESOURCE_GROUP" || (echo "Missing AZURE_RESOURCE_GROUP (set as var or secret)" && exit 1)
          test -n "$AZURE_CONTAINERAPP_NAME" || (echo "Missing AZURE_CONTAINERAPP_NAME (set as var or secret)" && exit 1)
          test -n "$ACR_LOGIN_SERVER" || (echo "Missing secrets.ACR_LOGIN_SERVER" && exit 1)

      - name: Deploy image to Azure Container Apps
        run: |
          IMAGE="$ACR_LOGIN_SERVER/photoapp:${{ github.sha }}"
          az containerapp update \
            --name "$AZURE_CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE"